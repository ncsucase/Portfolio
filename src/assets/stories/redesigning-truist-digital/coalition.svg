<svg width="1269" height="358" viewBox="0 0 1269 358" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="coalition-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="var(--accent, rgb(175, 82, 222))"/>
    </marker>
  </defs>

  <style>
    .card-title {
      font-family: var(--font-heading, 'Epilogue', system-ui, sans-serif);
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -0.02em;
      fill: var(--text-h, #000);
    }
    .card-sub {
      font-family: var(--font-ui, 'Inter', system-ui, sans-serif);
      font-size: 15px;
      fill: var(--text-muted, rgba(0, 0, 0, 0.55));
    }
    .annotation {
      font-family: var(--font-heading, 'Epilogue', system-ui, sans-serif);
      font-weight: 700;
      font-size: 20px;
      fill: var(--accent, rgb(175, 82, 222));
    }
    .chart-title {
      font-family: var(--font-heading, 'Epilogue', system-ui, sans-serif);
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -0.02em;
      fill: var(--text-h, #000);
    }
    .divider { stroke: var(--border, rgba(0, 0, 0, 0.2)); }
    @media (prefers-color-scheme: dark) {
      .card-title  { fill: var(--text-h, #f3f4f6); }
      .card-sub    { fill: var(--text-muted, rgba(255, 255, 255, 0.6)); }
      .annotation  { fill: var(--accent, rgb(191, 90, 242)); }
      .chart-title { fill: var(--text-h, #f3f4f6); }
      .divider     { stroke: var(--border, rgba(255, 255, 255, 0.25)); }
    }
  </style>

  <!-- Wholesale card — yellow, tilted -->
  <g transform="rotate(-13, 130, 167)">
    <rect x="28" y="65" width="204" height="204" rx="24" fill="var(--color-caution, #FFCC00)"/>
    <text x="130" y="148" text-anchor="middle" class="card-title">Wholesale</text>
    <text x="130" y="179" text-anchor="middle" class="card-sub">Commercial, large</text>
    <text x="130" y="199" text-anchor="middle" class="card-sub">businesses</text>
  </g>

  <!-- Design System -->
  <rect x="257" y="67" width="200" height="200" rx="24" fill="var(--color-success, #34C759)"/>
  <text x="357" y="133" text-anchor="middle" class="card-title">Design</text>
  <text x="357" y="165" text-anchor="middle" class="card-title">System</text>
  <text x="357" y="198" text-anchor="middle" class="card-sub">Tokenized &amp; governed</text>

  <!-- Commerce -->
  <rect x="469" y="67" width="200" height="200" rx="24" fill="var(--color-success, #34C759)"/>
  <text x="569" y="151" text-anchor="middle" class="card-title">Commerce</text>
  <text x="569" y="186" text-anchor="middle" class="card-sub">Opening new accounts</text>

  <!-- Public Sites -->
  <rect x="681" y="67" width="200" height="200" rx="24" fill="var(--color-success, #34C759)"/>
  <text x="781" y="133" text-anchor="middle" class="card-title">Public</text>
  <text x="781" y="165" text-anchor="middle" class="card-title">Sites</text>
  <text x="781" y="198" text-anchor="middle" class="card-sub">Marketing &amp;</text>
  <text x="781" y="218" text-anchor="middle" class="card-sub">acquisition</text>

  <!-- Retail -->
  <rect x="893" y="67" width="200" height="200" rx="24" fill="var(--color-success, #34C759)"/>
  <text x="993" y="151" text-anchor="middle" class="card-title">Retail</text>
  <text x="993" y="186" text-anchor="middle" class="card-sub">Personal, wealth, &amp;</text>
  <text x="993" y="206" text-anchor="middle" class="card-sub">small business</text>

  <!-- "my team" annotation + arrow -->
  <text x="1158" y="32" text-anchor="middle" class="annotation">my team</text>
  <path d="M 1138 42 C 1115 54, 1090 60, 1064 72"
        stroke="var(--accent, rgb(175, 82, 222))"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"
        marker-end="url(#coalition-arrow)"/>

  <!-- Divider -->
  <line x1="60" y1="285" x2="1110" y2="285" class="divider" stroke-width="1.5"/>

  <!-- Bottom title -->
  <text x="634" y="330" text-anchor="middle" class="chart-title">Coalition to redesign Truist digital</text>
</svg>
